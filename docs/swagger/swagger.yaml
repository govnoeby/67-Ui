basePath: /
definitions:
  controller.CopyInboundClientsRequest:
    properties:
      clientEmails:
        items:
          type: string
        type: array
      flow:
        type: string
      sourceInboundId:
        type: integer
    type: object
  controller.LoginForm:
    description: Login form with username, password and optional 2FA code.
    properties:
      password:
        type: string
      twoFactorCode:
        type: string
      username:
        type: string
    type: object
  controller.customGeoForm:
    properties:
      alias:
        type: string
      type:
        type: string
      url:
        type: string
    type: object
  controller.getDbPasswordRequest:
    properties:
      password:
        type: string
    type: object
  controller.updateUserForm:
    properties:
      newPassword:
        type: string
      newUsername:
        type: string
      oldPassword:
        type: string
      oldUsername:
        type: string
    type: object
  entity.AllSetting:
    properties:
      datepicker:
        description: Date picker format
        type: string
      expireDiff:
        description: Expiration warning threshold in days
        type: integer
      externalTrafficInformEnable:
        description: Enable external traffic reporting
        type: boolean
      externalTrafficInformURI:
        description: URI for external traffic reporting
        type: string
      ldapAutoCreate:
        type: boolean
      ldapAutoDelete:
        type: boolean
      ldapBaseDN:
        type: string
      ldapBindDN:
        type: string
      ldapDefaultExpiryDays:
        type: integer
      ldapDefaultLimitIP:
        type: integer
      ldapDefaultTotalGB:
        type: integer
      ldapEnable:
        description: LDAP settings
        type: boolean
      ldapFlagField:
        description: Generic flag configuration
        type: string
      ldapHost:
        type: string
      ldapInboundTags:
        type: string
      ldapInvertFlag:
        type: boolean
      ldapPassword:
        type: string
      ldapPort:
        type: integer
      ldapSyncCron:
        type: string
      ldapTruthyValues:
        type: string
      ldapUseTLS:
        type: boolean
      ldapUserAttr:
        description: e.g., mail or uid
        type: string
      ldapUserFilter:
        type: string
      ldapVlessField:
        type: string
      pageSize:
        description: UI settings
        type: integer
      remarkModel:
        description: Remark model pattern for inbounds
        type: string
      restartXrayOnClientDisable:
        description: Restart Xray when clients are auto-disabled by expiry/traffic
          limit
        type: boolean
      sessionMaxAge:
        description: Session maximum age in minutes
        type: integer
      subAnnounce:
        description: Subscription announce
        type: string
      subCertFile:
        description: SSL certificate file for subscription server
        type: string
      subClashEnable:
        description: Enable Clash/Mihomo subscription endpoint
        type: boolean
      subClashPath:
        description: Path for Clash/Mihomo subscription endpoint
        type: string
      subClashURI:
        description: Clash/Mihomo subscription server URI
        type: string
      subDomain:
        description: Domain for subscription server validation
        type: string
      subEnable:
        description: Subscription server settings
        type: boolean
      subEnableRouting:
        description: Enable routing for subscription
        type: boolean
      subEncrypt:
        description: Encrypt subscription responses
        type: boolean
      subJsonEnable:
        description: Enable JSON subscription endpoint
        type: boolean
      subJsonFragment:
        description: JSON subscription fragment configuration
        type: string
      subJsonMux:
        description: JSON subscription mux configuration
        type: string
      subJsonNoises:
        description: JSON subscription noise configuration
        type: string
      subJsonPath:
        description: Path for JSON subscription endpoint
        type: string
      subJsonRules:
        type: string
      subJsonURI:
        description: JSON subscription server URI
        type: string
      subKeyFile:
        description: SSL private key file for subscription server
        type: string
      subListen:
        description: Subscription server listen IP
        type: string
      subPath:
        description: Base path for subscription URLs
        type: string
      subPort:
        description: Subscription server port
        type: integer
      subProfileUrl:
        description: Subscription profile URL
        type: string
      subRoutingRules:
        description: Subscription global routing rules (Only for Happ)
        type: string
      subShowInfo:
        description: Show client information in subscriptions
        type: boolean
      subSupportUrl:
        description: Subscription support URL
        type: string
      subTitle:
        description: Subscription title
        type: string
      subURI:
        description: Subscription server URI
        type: string
      subUpdates:
        description: Subscription update interval in minutes
        type: integer
      tgBotAPIServer:
        description: Custom API server for Telegram bot
        type: string
      tgBotBackup:
        description: Enable database backup via Telegram
        type: boolean
      tgBotChatId:
        description: Telegram chat ID for notifications
        type: string
      tgBotEnable:
        description: Telegram bot settings
        type: boolean
      tgBotLoginNotify:
        description: Send login notifications
        type: boolean
      tgBotProxy:
        description: Proxy URL for Telegram bot
        type: string
      tgBotToken:
        description: Telegram bot token
        type: string
      tgCpu:
        description: CPU usage threshold for alerts
        type: integer
      tgLang:
        description: Telegram bot language
        type: string
      tgRunTime:
        description: Cron schedule for Telegram notifications
        type: string
      timeLocation:
        description: Security settings
        type: string
      trafficDiff:
        description: Traffic warning threshold percentage
        type: integer
      twoFactorEnable:
        description: Enable two-factor authentication
        type: boolean
      twoFactorToken:
        description: Two-factor authentication token
        type: string
      webBasePath:
        description: Base path for web panel URLs
        type: string
      webCertFile:
        description: Path to SSL certificate file for web server
        type: string
      webDomain:
        description: Web server domain for domain validation
        type: string
      webKeyFile:
        description: Path to SSL private key file for web server
        type: string
      webListen:
        description: Web server settings
        type: string
      webPort:
        description: Web server port number
        type: integer
    type: object
  entity.Msg:
    properties:
      msg:
        description: Response message text
        type: string
      obj:
        description: Optional data object
      success:
        description: Indicates if the operation was successful
        type: boolean
    type: object
  model.Inbound:
    properties:
      allTime:
        description: All-time traffic usage
        type: integer
      clientStats:
        description: Client traffic statistics
        items:
          $ref: '#/definitions/xray.ClientTraffic'
        type: array
      down:
        description: Download traffic in bytes
        type: integer
      enable:
        description: Whether the inbound is enabled
        type: boolean
      expiryTime:
        description: Expiration timestamp
        type: integer
      id:
        description: Unique identifier
        type: integer
      lastTrafficResetTime:
        description: Last traffic reset timestamp
        type: integer
      listen:
        description: Xray configuration fields
        type: string
      nodeId:
        description: |-
          NodeID points at the remote panel (Node) where this inbound's xray
          actually runs. NULL means the inbound runs on the local xray (the
          pre-multi-node behaviour). Existing rows migrate to NULL with no
          backfill.
        type: integer
      port:
        type: integer
      protocol:
        $ref: '#/definitions/model.Protocol'
      remark:
        description: Human-readable remark
        type: string
      settings:
        type: string
      sniffing:
        type: string
      streamSettings:
        type: string
      tag:
        type: string
      total:
        description: Total traffic limit in bytes
        type: integer
      trafficReset:
        description: Traffic reset schedule
        type: string
      up:
        description: Upload traffic in bytes
        type: integer
    type: object
  model.Node:
    properties:
      address:
        type: string
      apiToken:
        type: string
      basePath:
        type: string
      cpuPct:
        type: number
      createdAt:
        type: integer
      enable:
        type: boolean
      id:
        type: integer
      lastError:
        type: string
      lastHeartbeat:
        description: unix seconds, 0 = never
        type: integer
      latencyMs:
        type: integer
      memPct:
        type: number
      name:
        type: string
      port:
        type: integer
      remark:
        type: string
      scheme:
        type: string
      status:
        description: |-
          Heartbeat-updated fields. UpdatedAt advances on every probe even when
          the row is otherwise unchanged so the UI's "last seen" tooltip is
          truthful without us having to read LastHeartbeat separately.
        type: string
      updatedAt:
        type: integer
      uptimeSecs:
        type: integer
      xrayVersion:
        type: string
    type: object
  model.Protocol:
    enum:
    - vmess
    - vless
    - tunnel
    - http
    - trojan
    - shadowsocks
    - mixed
    - wireguard
    - hysteria
    - hysteria2
    type: string
    x-enum-varnames:
    - VMESS
    - VLESS
    - Tunnel
    - HTTP
    - Trojan
    - Shadowsocks
    - Mixed
    - WireGuard
    - Hysteria
    - Hysteria2
  xray.ClientTraffic:
    properties:
      allTime:
        type: integer
      down:
        type: integer
      email:
        type: string
      enable:
        type: boolean
      expiryTime:
        type: integer
      id:
        type: integer
      inboundId:
        type: integer
      lastOnline:
        type: integer
      reset:
        type: integer
      subId:
        type: string
      total:
        type: integer
      up:
        type: integer
      uuid:
        type: string
    type: object
host: localhost:2053
info:
  contact:
    name: MHSanaei
    url: https://github.com/MHSanaei/3x-ui
  description: Advanced web panel for managing Xray-core servers. Supports VMESS,
    VLESS, Trojan, Shadowsocks, Hysteria, WireGuard, and more.
  license:
    name: GNU GPL v3
    url: https://www.gnu.org/licenses/gpl-3.0.html
  termsOfService: https://github.com/MHSanaei/3x-ui
  title: 3X-UI Panel API
  version: 3.0.1
paths:
  /:
    get:
      description: If authenticated, redirects to /panel/. Otherwise serves the login
        SPA.
      responses:
        "302":
          description: Found
      summary: Redirect to panel or show login page
      tags:
      - Authentication
  /csrf-token:
    get:
      description: Returns a CSRF token for the current session. Required by the SPA
        for unsafe requests. Public endpoint — no auth needed.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      summary: Get CSRF token
      tags:
      - Authentication
  /getTwoFactorEnable:
    post:
      description: Returns whether two-factor authentication is enabled on the panel.
        Used by the login page to decide whether to show the OTP field.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      summary: Check if 2FA is enabled
      tags:
      - Authentication
  /login:
    post:
      consumes:
      - application/json
      description: Login with username and password. Returns a session cookie on success.
        Supports optional 2FA TOTP code.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.LoginForm'
      produces:
      - application/json
      responses:
        "200":
          description: Logged in successfully
          schema:
            $ref: '#/definitions/entity.Msg'
        "401":
          description: Wrong username or password
          schema:
            $ref: '#/definitions/entity.Msg'
      summary: Authenticate user
      tags:
      - Authentication
  /logout:
    get:
      description: Clears the session cookie and redirects to the login page.
      responses:
        "302":
          description: Found
      summary: Logout
      tags:
      - Authentication
  /panel/api/backuptotgbot:
    get:
      description: Sends a fresh database backup to every Telegram chat configured
        as an admin recipient.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Backup to Telegram
      tags:
      - Backup
  /panel/api/custom-geo/add:
    post:
      consumes:
      - application/json
      description: Registers a custom geo source. Alias is auto-normalised; URL must
        point to a .dat or .json file.
      parameters:
      - description: Custom geo source details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.customGeoForm'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Add custom geo source
      tags:
      - Custom Geo
  /panel/api/custom-geo/aliases:
    get:
      description: Returns geo aliases usable in routing rules — both built-in defaults
        and user-configured ones.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: List geo aliases
      tags:
      - Custom Geo
  /panel/api/custom-geo/delete/{id}:
    post:
      description: Removes a custom geo source and its cached file from disk.
      parameters:
      - description: Custom geo source ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Delete custom geo source
      tags:
      - Custom Geo
  /panel/api/custom-geo/download/{id}:
    post:
      description: Triggers a re-download of a custom geo source from its URL.
      parameters:
      - description: Custom geo source ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Download custom geo file
      tags:
      - Custom Geo
  /panel/api/custom-geo/list:
    get:
      description: Returns all configured custom geo sources with type, alias, URL,
        status, and download timestamps.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: List custom geo sources
      tags:
      - Custom Geo
  /panel/api/custom-geo/update-all:
    post:
      description: Re-downloads every configured custom geo source. Errors are reported
        per-source in the response.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Update all custom geo sources
      tags:
      - Custom Geo
  /panel/api/custom-geo/update/{id}:
    post:
      consumes:
      - application/json
      description: Replaces a custom geo source configuration. Body shape matches
        /add.
      parameters:
      - description: Custom geo source ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated source details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.customGeoForm'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Update custom geo source
      tags:
      - Custom Geo
  /panel/api/inbounds/{id}/copyClients:
    post:
      consumes:
      - application/json
      description: Copies selected clients from one inbound to another. Useful for
        duplicating user lists across protocols.
      parameters:
      - description: Target inbound ID
        in: path
        name: id
        required: true
        type: integer
      - description: Copy request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.CopyInboundClientsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Copy clients between inbounds
      tags:
      - Inbounds
  /panel/api/inbounds/{id}/delClient/{clientId}:
    post:
      description: Removes a client from an inbound by its UUID/password.
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      - description: Client UUID or password
        in: path
        name: clientId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Delete client from inbound
      tags:
      - Inbounds
  /panel/api/inbounds/{id}/delClientByEmail/{email}:
    post:
      description: Removes a client from an inbound using email instead of UUID.
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      - description: Client email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Delete client by email
      tags:
      - Inbounds
  /panel/api/inbounds/{id}/resetClientTraffic/{email}:
    post:
      description: Zeros out upload and download counters for a single client.
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      - description: Client email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Reset client traffic
      tags:
      - Inbounds
  /panel/api/inbounds/add:
    post:
      consumes:
      - application/json
      description: Creates a new inbound configuration with protocol, port, stream
        settings, and clients.
      parameters:
      - description: Inbound configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.Inbound'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Create inbound
      tags:
      - Inbounds
  /panel/api/inbounds/addClient:
    post:
      consumes:
      - application/json
      description: Adds one or more clients to an existing inbound. The settings field
        carries the JSON-encoded clients array.
      parameters:
      - description: Inbound with new client settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.Inbound'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Add client to inbound
      tags:
      - Inbounds
  /panel/api/inbounds/clearClientIps/{email}:
    post:
      description: Resets the recorded IP address list for a client.
      parameters:
      - description: Client email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Clear client IPs
      tags:
      - Inbounds
  /panel/api/inbounds/clientIps/{email}:
    post:
      description: Returns source IPs that have connected with the given client's
        credentials. Includes timestamps.
      parameters:
      - description: Client email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Get client IPs
      tags:
      - Inbounds
  /panel/api/inbounds/del/{id}:
    post:
      description: Deletes an inbound and its associated client traffic stats by ID.
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Delete inbound
      tags:
      - Inbounds
  /panel/api/inbounds/delDepletedClients/{id}:
    post:
      description: Removes clients whose traffic cap or expiry has elapsed. Pass id=-1
        to sweep every inbound.
      parameters:
      - description: Inbound ID, or -1 for all
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Delete depleted clients
      tags:
      - Inbounds
  /panel/api/inbounds/get/{id}:
    get:
      description: Fetch a single inbound configuration with traffic stats.
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/entity.Msg'
            - properties:
                obj:
                  $ref: '#/definitions/model.Inbound'
              type: object
      security:
      - BearerAuth: []
      summary: Get inbound by ID
      tags:
      - Inbounds
  /panel/api/inbounds/getClientLinks/{id}/{email}:
    get:
      description: Returns the URL(s) for one client on one inbound (same as the Copy
        URL button in the UI). Supports vmess, vless, trojan, shadowsocks, hysteria,
        hysteria2.
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      - description: Client email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/entity.Msg'
            - properties:
                obj:
                  items:
                    type: string
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Get client links
      tags:
      - Inbounds
  /panel/api/inbounds/getClientTraffics/{email}:
    get:
      description: Returns traffic counters for a client identified by email.
      parameters:
      - description: Client email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Get client traffic by email
      tags:
      - Inbounds
  /panel/api/inbounds/getClientTrafficsById/{id}:
    get:
      description: Returns traffic counters for a client identified by its UUID/password.
      parameters:
      - description: Client UUID or password
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - BearerAuth: []
      summary: Get client traffic by ID
      tags:
      - Inbounds
  /panel/api/inbounds/getSubLinks/{subId}:
    get:
      description: Returns every protocol URL (vless://, vmess://, etc.) for clients
        matching the subscription ID. Same data as /sub/{subId} but as JSON array.
      parameters:
      - description: Subscription ID from client's subId field
        in: path
        name: subId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/entity.Msg'
            - properties:
                obj:
                  items:
                    type: string
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Get subscription links
      tags:
      - Inbounds
  /panel/api/inbounds/import:
    post:
      consumes:
      - multipart/form-data
      description: Bulk-imports an inbound from a JSON blob (e.g., exported from another
